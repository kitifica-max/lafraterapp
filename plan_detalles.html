<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Frater - Plan Kairos</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/plan_detalles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A1931">
</head>
<body>

  <header class="dashboard-header plan-header">
    <h1>Plan Kairos</h1>
    <p class="plan-header-sub">Día 112 • Semana 16</p>
  </header>

  <div class="progress-card">
    <div class="progress-header">
      <h3>Tu Progreso Anual</h3>
      <span class="progress-percentage">31%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill"></div>
    </div>
    <p>Has completado 111 días de 365. ¡Sigue así!</p>
  </div>

  <div class="notification-card">
    <div class="notification-info">
      <h4>Recordatorio Diario</h4>
      <p>Recibe una alerta para tu lectura</p>
    </div>
    <label class="switch">
      <input type="checkbox" checked>
      <span class="slider"></span>
    </label>
  </div>

  <main class="reading-section">
    <h2>Lectura de hoy</h2>
    
    <div class="reading-item">
      <input type="checkbox" id="lectura1">
      <label for="lectura1">Juan 1:1-14</label>
    </div>

    <div class="reading-item">
      <input type="checkbox" id="lectura2">
      <label for="lectura2">Salmos 23</label>
    </div>

    <div class="reading-item">
      <input type="checkbox" id="lectura3">
      <label for="lectura3">Proverbios 3:1-6</label>
    </div>
  </main>

  <div class="content-spacer"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      Inicio
    </a>
    <a href="explore.html" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
      Explora
    </a>
    <a href="#" class="nav-item nav-fab">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </a>
    <a href="plan_detalles.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      Plan
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      Perfil
    </a>
  </nav>

  <script>
    const checkboxes = document.querySelectorAll('.reading-item input[type="checkbox"]');
    
    checkboxes.forEach(box => {
      box.addEventListener('change', function() {
        const parentDiv = this.parentElement;
        if (this.checked) {
          parentDiv.classList.add('completed');
        } else {
          parentDiv.classList.remove('completed');
        }
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth-guard.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
