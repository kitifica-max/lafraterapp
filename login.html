<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Frater - Acceso</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A1931">
  <style>
    .input-group { margin-bottom: 16px; }

    .toggle-password {
      position: relative;
    }
    .toggle-password input {
      padding-right: 44px;
    }
    .toggle-password button {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #8FAECF;
      padding: 4px;
      line-height: 1;
    }

    .error-msg {
      color: #E74C3C;
      font-size: 13px;
      margin-top: 4px;
      display: none;
    }
    .error-msg.visible { display: block; }

    .code-hint {
      font-size: 12px;
      color: #8FAECF;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="login-container" id="loginView">
    <header class="login-header">
      <img src="img/LogoFrater_1.png" alt="Logo Frater" onerror="this.outerHTML='<h1 style=\'color:#0A1931;\'>FRATER</h1>'">
    </header>

    <main class="login-body" id="formSection">
      <h1 class="login-title">¡Bienvenido!</h1>
      <p class="login-subtitle">Ingresa tu correo y el código de acceso que te proporcionó tu líder.</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" required autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Código de acceso</label>
          <div class="toggle-password">
            <input type="password" id="password" placeholder="Ingresa tu código" required autocomplete="current-password">
            <button type="button" onclick="togglePass()" id="eyeBtn" aria-label="Mostrar contraseña">👁</button>
          </div>
          <p class="code-hint">Tu código fue compartido por un administrador de Frater.</p>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button type="submit" class="btn-primary" id="submitBtn">Entrar</button>
      </form>
    </main>

    <!-- Estado de carga -->
    <main class="feedback-state" id="feedbackSection" style="display:none;">
      <div id="loadingState">
        <div class="spinner"></div>
        <h2 class="login-title">Verificando acceso...</h2>
      </div>
    </main>

    <footer class="login-footer">
      © 2026 Fraternidad Cristiana de El Salvador
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Si ya hay sesión activa, redirigir al inicio
    (async () => {
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (session) {
        window.location.replace('/index.html');
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';

      // Mostrar spinner
      document.getElementById('formSection').style.display    = 'none';
      document.getElementById('feedbackSection').style.display = 'flex';

      const { error } = await window.supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        document.getElementById('feedbackSection').style.display = 'none';
        document.getElementById('formSection').style.display     = 'flex';

        errorMsg.textContent = error.message === 'Invalid login credentials'
          ? 'Correo o código de acceso incorrecto. Verifica tus datos.'
          : 'Error de acceso: ' + error.message;
        errorMsg.classList.add('visible');
        return;
      }

      // Login exitoso → redirigir
      window.location.replace('/index.html');
    }

    function togglePass() {
      const input  = document.getElementById('password');
      const btn    = document.getElementById('eyeBtn');
      const isPass = input.type === 'password';
      input.type   = isPass ? 'text' : 'password';
      btn.textContent = isPass ? '🙈' : '👁';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
